name: Build and Push Docker Image

# This workflow allows you to manually trigger a deployment from the GitHub Actions tab.
# You can select which branch you want to build from.
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag for the Docker image (e.g., latest, v1.0.0)"
        required: true
        default: "latest"
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Log in to Docker Hub using secrets configured in your GitHub repository
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push the image to Docker Hub
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Use user-provided tag on manual trigger, or 'latest' on push
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fairshare-backend:${{ github.event.inputs.image_tag || 'latest' }}

      # Trigger Render deployment via Deploy Hook
      - name: Trigger Render Deploy
        if: success()
        run: |
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
